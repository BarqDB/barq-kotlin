name: Publish

on:
  push:
    tags:
      - "v*"
  # Rehearse the full multi-OS assembly without publishing: a manual run builds and
  # verifies the fat jar but skips the Maven Central upload (guarded on event_name).
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build the Linux + Windows JVM engines on their own runners (macOS is built in-job below).
  native:
    name: Native JVM libs
    uses: ./.github/workflows/build-jvm-native.yml

  maven-central:
    name: Maven Central
    needs: native
    runs-on: macos-14
    timeout-minutes: 360
    env:
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signBuild: "true"
      ORG_GRADLE_PROJECT_signKeyIdKotlin: ${{ secrets.SIGN_KEY_ID_KOTLIN }}
      ORG_GRADLE_PROJECT_signSecretRingFileKotlin: ${{ secrets.SIGN_SECRET_RING_FILE_KOTLIN }}
      ORG_GRADLE_PROJECT_signPasswordKotlin: ${{ secrets.SIGN_PASSWORD_KOTLIN }}
      GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
      GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install native build tools
        run: brew install swig ccache

      - name: Install CMake toolchains for native builds
        run: |
          # Android's NDK 23 toolchain needs CMake < 4.0; install the SDK CMake for AGP
          # (the cinterop android build pins version "3.22.1" and resolves it from the SDK).
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "cmake;3.22.1"
          # macOS/iOS/JVM host builds need a FULL CMake (the Android SDK cmake can't detect the
          # host compiler). Pin CMake 3.26.4: >= barq-core's 3.22.1 minimum, < 4.0 (4.x rejects
          # the NDK toolchain), and older than 3.31 which errors on the macOS universal-binary
          # compiler-ABI arch check ("x86_64;arm64" vs a single-arch compiler probe).
          curl -fsSL https://github.com/Kitware/CMake/releases/download/v3.26.4/cmake-3.26.4-macos-universal.tar.gz -o /tmp/cmake.tgz
          tar -xzf /tmp/cmake.tgz -C /tmp
          echo "/tmp/cmake-3.26.4-macos-universal/CMake.app/Contents/bin" >> "$GITHUB_PATH"

      - name: Validate release tag
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          version="$(sed -n 's/.*const val version = "\([^"]*\)".*/\1/p' buildSrc/src/main/kotlin/Config.kt)"
          test "${GITHUB_REF_NAME}" = "v${version}"

      - name: Validate publishing secrets
        run: |
          set -euo pipefail
          test -n "${MAVEN_CENTRAL_USERNAME}"
          test -n "${MAVEN_CENTRAL_PASSWORD}"
          test -n "${ORG_GRADLE_PROJECT_signSecretRingFileKotlin}"
          test -n "${ORG_GRADLE_PROJECT_signPasswordKotlin}"

      # Stage the Linux/Windows engines built by the `native` job DIRECTLY into cinterop's
      # jvm resources, so jvmProcessResources bundles them into cinterop-jvm.jar. This
      # bypasses copyJVMSharedLibs (whose up-to-date check skipped the copy). The `clean`
      # below deletes only build/, .cxx and the macOS dylib output — NOT jni/linux or
      # jni/windows — so these survive, and the macOS dylib is rebuilt in-job.
      - name: Stage native JVM engine (Linux)
        uses: actions/download-artifact@v4
        with:
          name: jni-linux
          path: packages/cinterop/src/jvmMain/resources/jni/linux

      - name: Stage native JVM engine (Windows)
        uses: actions/download-artifact@v4
        with:
          name: jni-windows
          path: packages/cinterop/src/jvmMain/resources/jni/windows

      - name: Build signed Maven artifacts
        working-directory: packages
        run: |
          ./gradlew --console=plain --no-daemon clean publishCIPackages \
            -PgeneratePluginArtifactMarker=true \
            -Pbarq.kotlin.mainHost=true \
            -Pbarq.kotlin.targets=iosArm64,iosX64,jvm,macosX64,macosArm64,android,compilerPlugin,gradlePlugin

      # The engines live in cinterop-jvm.jar (library-base-jvm depends on it, transitively
      # pulling the native code). Fail before upload if any engine is missing — never
      # publish a jar that only works on one OS.
      - name: Verify cinterop-jvm jar bundles macOS + Linux + Windows engines
        run: |
          set -euo pipefail
          jar="$(find packages -name 'cinterop-jvm-*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -1)"
          test -n "$jar" || { echo "cinterop-jvm jar not found"; exit 1; }
          echo "Inspecting: $jar"
          unzip -l "$jar" | grep -E 'jni/' || true
          for p in jni/macos/libbarqc.dylib jni/linux/libbarqc.so jni/windows/barqc.dll; do
            unzip -l "$jar" | grep -q "$p" || { echo "MISSING native engine: $p"; exit 1; }
            echo "  ok: $p"
          done

      - name: Upload and release to Maven Central
        if: github.event_name == 'push'
        run: |
          ./.github/scripts/upload-maven-central.sh \
            packages/build/m2-buildrepo \
            "barq-kotlin-${GITHUB_REF_NAME}"

      - name: Publish Gradle plugin to Plugin Portal
        if: ${{ github.event_name == 'push' && env.GRADLE_PUBLISH_KEY != '' && env.GRADLE_PUBLISH_SECRET != '' }}
        working-directory: packages
        run: |
          ./gradlew --console=plain --no-daemon :gradle-plugin:publishPlugins \
            -PgeneratePluginArtifactMarker=true
